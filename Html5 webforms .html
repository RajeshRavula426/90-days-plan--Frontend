<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <label for="FirstName">First Name:</label>
        <input type="text" required name="firstName" id="firstNameid" placeholder="Enter your first name">
        <input type="text" name="lastName" id="lastNameid" placeholder="Enter your last name">
        <input type="email" name="email" id="emailid" placeholder="Enter your email">
        <input type="password" name="password" id="passwordid" placeholder="Enter your password">
        <input type="number" name="age" id="ageid" placeholder="Enter your age">
        <input type="tel" name="mobile" id="mobileid" placeholder="Enter your mobile number">
        <input type="url" name="website" id="websiteid" placeholder="Enter your website URL">
        <input type="date" name="dob" id="dobid">
        <input type="color" name="favcolor" id="favcolorid">
        <input type="radio" name="gender" id="maleid" value="male"> Male
        <input type="radio" name="gender" id="femaleid" value="female"> Female
        <input type="radio" name="gender" id="otherid" value="other"> Other
        <input type="file" name="profilePic" id="profilePicid">
        <input type="hidden" name="userId" value="12345">
        <select name="country" id="countryid">
            <option value="">Select Country</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
        </select>
        <select>
            <input list="courses" placeholder="Select a course">
            <datalist id="courses">
                <option value="B.Tech">
                <option value="M.Tech">
                <option value="MBA">
                <option value="BBA">
                <option value="BCA">

            </datalist>

        </select>
        <button>
            Submit
        </button>
        <button type="reset"> Reset </button>




    </form>
</body>

</html>
