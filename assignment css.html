<!DOCTYPE html>
<html>

<head>
    <style>
        /* all inputs */
        input {
            width: 250px;
            padding: 8px;
            margin: 8px;
            border: 1px solid rgb(128, 128, 128);
        }

        /* only email input */
        input[type="email"] {
            background-color: rgb(230, 173, 222);
        }

        /* when input is selected */
        input:focus {
            background-color: rgb(255, 0, 106);
        }

        /* button */
        button {
            padding: 8px 16px;
            margin: 8px;
        }

        /* button hover */
        button:hover {
            background-color: rgb(0, 2, 128);
            color: white;
        }
    </style>
</head>

<body>

    <form>
        <input type="First Name" placeholder="Enter your name">
        <br>
        <input type="Last Name" placeholder="Enter your Last name">
        <br>
        <input type="email" placeholder="Email">
        <br>
        <input type="url" placeholder="Website URL">
        <br>
        <input type="tel" placeholder="Phone Number">
        <br>
        <input type="date" placeholder="Date of Birth">
        <br>
        <input type="text" placeholder="Username">

        <br>

        <input type="password" placeholder="Password">

        <br>

        <button>Login</button>
        <button type="reset">Reset</button>

    </form>

</body>

</html>
