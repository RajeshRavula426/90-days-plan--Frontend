<!DOCTYPE html>
<html>
<head>
<title>Rajesh Text Effect</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:
    radial-gradient(circle, #18002d 10%, #000 70%);
  overflow:hidden;
}

h1{
  font-family: Arial Black;
  font-size: 130px;
  font-style: italic;
  margin: 0;

  color: #ff4fcf;

  text-shadow:
    2px 2px 0 #9eff66,
    4px 4px 0 #cc8400,
    6px 6px 0 #8b5a00,
    0 0 20px #ff00ff,
    0 0 40px #a100ff;
}

</style>
</head>
<body>

<h1>Rajesh</h1>

</body>
</html>
