<!DOCTYPE html>
<html>
<head>
<style>

input{
  padding: 10px;
}

input[type="email"]{
  background-color: lightblue;
}

button{
  background: green;
  color: white;
}

button:hover{
  background: orange;
}

</style>
</head>
<body>

<form>

<input type="text" placeholder="Name">

<br><br>

<input type="email" placeholder="Email">

<br><br>

<button>Submit</button>

</form>

</body>
</html>




<!DOCTYPE html>
<html>
<head>
<style>

th{
  background:black;
  color:white;
}

tr:nth-child(even){
  background:lightgray;
}

tr:hover{
  background:yellow;
}

td:first-child{
  color:blue;
}

</style>
</head>
<body>

<table border="1">

<tr>
<th>Name</th>
<th>Marks</th>
</tr>

<tr>
<td>Rajesh</td>
<td>90</td>
</tr>

<tr>
<td>Rahul</td>
<td>85</td>
</tr>

</table>

</body>
</html>








<!DOCTYPE html>
<html>
<head>
<style>

li:first-child{
  color:red;
}

li:last-child{
  color:blue;
}

li:nth-child(3){
  color:green;
}

li:hover{
  font-size:30px;
}

</style>
</head>
<body>

<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
<li>React</li>
</ul>

</body>
</html>
