<!DOCTYPE html>
<html>
<head>
<title>Media Query Practice</title>

<style>

*{
    margin: 2px;;
    padding: 2px;;
    box-sizing:border-box;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
    border-radius:5px;
}

body{
    font-family:Arial;
    background:lightblue;
    text-align:center;
}

/* Header */
h1{
    background:navy;
    color:white;
    padding:20px;
}

/* Box */
.box{
    width:300px;
    margin:40px auto;
    padding:30px;
    border:3px solid black;
    background:white;
    font-size:24px;
    border-radius:10px;
}

.box:hover{
    background:yellow;
}

/* Button */
button{
    padding:10px 20px;
    background:rgb(9, 0, 128);
    color:white;
    border:none;
    font-size:18px;
}


/* Tablet */
@media(max-width:900px){

body{
    background:lightgreen;
}

.box{
    width:220px;
    font-size:20px;
}

}


/* Mobile */
@media(max-width:600px){

body{
    background:lightcoral;
}

.box{
    width:150px;
    font-size:16px;
    padding:20px;
}

button{
    width:100%;
}

}

</style>
</head>

<body>

<h1>CSS Media Query Practice</h1>

<div class="box">
Hello Rajesh
<br>
<br>
<button>Click Here</button>
</div>

</body>
</html>
